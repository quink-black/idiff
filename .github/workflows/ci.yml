name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # macOS -- Homebrew, ImageMagick (default backend)
  # ----------------------------------------------------------------
  macos:
    name: macOS (ImageMagick)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install opencv imagemagick libraw sdl2

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIDIFF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j "$(sysctl -n hw.ncpu)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release -j "$(sysctl -n hw.ncpu)"

  # ----------------------------------------------------------------
  # Linux -- apt, ImageMagick (default backend)
  # ----------------------------------------------------------------
  linux:
    name: Linux (ImageMagick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libmagick++-dev \
            libraw-dev \
            libsdl2-dev \
            pkg-config

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIDIFF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j "$(nproc)"

  # ----------------------------------------------------------------
  # Windows -- vcpkg, OpenCV imgcodecs backend
  # ----------------------------------------------------------------
  windows:
    name: Windows (OpenCV imgcodecs)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DIDIFF_USE_OPENCV_IMGCODECS=ON `
            -DIDIFF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
