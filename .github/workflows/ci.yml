name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # macOS -- Homebrew, ImageMagick (default backend)
  # ----------------------------------------------------------------
  macos:
    name: macOS (ImageMagick)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install opencv imagemagick libraw sdl2

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIDIFF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j "$(sysctl -n hw.ncpu)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release -j "$(sysctl -n hw.ncpu)"

  # ----------------------------------------------------------------
  # Linux -- apt, ImageMagick (default backend)
  # ----------------------------------------------------------------
  linux:
    name: Linux (ImageMagick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libmagick++-dev \
            libraw-dev \
            libsdl2-dev \
            libgtk-3-dev \
            pkg-config

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIDIFF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j "$(nproc)"

  # ----------------------------------------------------------------
  # Windows -- prebuilt vcpkg deps, OpenCV imgcodecs backend
  #
  # Dependencies are prebuilt by the build-deps.yml workflow and
  # published as a GitHub Release asset.  This avoids rebuilding
  # OpenCV from source on every CI run (saves ~20-30 min).
  #
  # To refresh the prebuilt archive after changing vcpkg.json, run
  # the "Build Windows Dependencies" workflow manually.
  # ----------------------------------------------------------------
  windows:
    name: Windows (OpenCV imgcodecs)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      # Tag of the GitHub Release that holds the prebuilt deps archive.
      # Bump this when you re-run build-deps.yml with a new tag.
      DEPS_TAG: deps-windows-v1
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg (toolchain file only, no package install)
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Download prebuilt dependencies
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:DEPS_TAG
          $asset = "vcpkg-deps-x64-windows.zip"
          $url = "https://github.com/${{ github.repository }}/releases/download/${tag}/${asset}"
          Write-Host "Downloading prebuilt deps from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $asset -Headers @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/octet-stream"
          }
          Write-Host "Extracting to C:\vcpkg_installed ..."
          Expand-Archive -Path $asset -DestinationPath C:\vcpkg_installed -Force
          Remove-Item $asset
          Write-Host "Done. Contents:"
          Get-ChildItem C:\vcpkg_installed -Depth 1

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_INSTALLED_DIR=C:\vcpkg_installed `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DIDIFF_USE_OPENCV_IMGCODECS=ON `
            -DIDIFF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
