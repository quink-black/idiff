name: Release

# Trigger on any tag that looks like a version (e.g. v0.2.0, v1.0.0-rc1)
# and also allow manual dispatch so maintainers can dry-run the flow
# without publishing a Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release to attach assets

jobs:
  # ----------------------------------------------------------------------
  # macOS -- build a self-contained .app, bundle every Homebrew dylib via
  # scripts/macos_bundle_deps.sh, ship as a .dmg AND a .zip. The zip is
  # the friendlier artifact for users who don't want to deal with
  # quarantine on a dmg-mounted app; the dmg is kept for the classic
  # drag-to-Applications flow.
  # ----------------------------------------------------------------------
  macos:
    name: macOS (.dmg + .zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        # Same set as ci.yml. Homebrew runners already have most of these.
        run: brew install opencv imagemagick libraw sdl2 create-dmg

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DIDIFF_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j "$(sysctl -n hw.ncpu)"

      - name: Package (bundle dylibs into .app)
        run: cmake --build build --target idiff_package

      - name: Sanity-check bundle is self-contained
        # Fail early if anything still points into /opt/homebrew or
        # /usr/local -- that would mean end users need Homebrew to run.
        run: |
          set -e
          APP=build/src/app/idiff.app
          echo '== main exe =='
          otool -L "$APP/Contents/MacOS/idiff"
          echo '== scanning for relocatable-prefix leaks =='
          leaks=$(
            { otool -L "$APP/Contents/MacOS/idiff";
              for f in "$APP"/Contents/Frameworks/*.dylib; do otool -L "$f"; done;
            } | grep -E '/opt/homebrew|/usr/local' || true
          )
          if [ -n "$leaks" ]; then
            echo "Bundle still references non-system libraries:"
            echo "$leaks"
            exit 1
          fi
          echo 'Bundle is clean.'

      - name: Stage distributable tree (.app + install.command)
        # Lay out everything we'll ship next to the .app so both the dmg
        # and the zip can share one tree. install.command is a
        # double-clickable helper that strips com.apple.quarantine and
        # copies the app to /Applications, which is the least painful
        # workaround for users who don't have an Apple Developer ID.
        run: |
          set -e
          mkdir -p dist/stage
          cp -R build/src/app/idiff.app dist/stage/
          cp scripts/macos_install.command dist/stage/install.command
          chmod +x dist/stage/install.command

      - name: Build .dmg
        run: |
          mkdir -p dist
          create-dmg \
            --volname "idiff" \
            --window-size 520 320 \
            --icon-size 96 \
            --icon idiff.app 120 140 \
            --icon install.command 260 140 \
            --app-drop-link 400 140 \
            "dist/idiff-${{ github.ref_name }}-macos.dmg" \
            dist/stage

      - name: Build .zip
        # `ditto -c -k --keepParent` preserves macOS resource forks and
        # extended attributes and is what Apple recommends for zipping
        # .app bundles. Compared to `zip -r`, the resulting archive is
        # more likely to round-trip through Safari/Finder without losing
        # the Info.plist / code signature.
        run: |
          set -e
          ZIP="dist/idiff-${{ github.ref_name }}-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/stage "$ZIP"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: idiff-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: true
          # Append a standard "how to launch on macOS" note to the
          # release body. softprops/action-gh-release merges this with
          # any body generated from the tag message.
          append_body: true
          body: |
            ### macOS: first-launch instructions

            This build is **ad-hoc signed** (no paid Apple Developer ID).
            macOS Gatekeeper will mark the downloaded app as quarantined
            and refuse to open it on first launch ("app is damaged" or
            "cannot verify developer"). Pick one of the following:

            1. **Easiest** — open the `.dmg`, double-click
               `install.command`. It will install `idiff.app` into
               `/Applications` and clear the quarantine flag. You can
               then launch it normally.

            2. **One-liner in Terminal** (after copying the app somewhere):

               ```bash
               xattr -dr com.apple.quarantine /Applications/idiff.app
               ```

            3. **Right-click → Open** the first time, then confirm "Open"
               in the dialog. (If macOS still reports the app as
               damaged, use option 1 or 2.)

  # ----------------------------------------------------------------------
  # Windows -- prebuilt vcpkg deps, OpenCV imgcodecs backend (no
  # ImageMagick on Windows; matches ci.yml). Ships a zipped directory
  # containing idiff.exe + every runtime DLL.
  #
  # Dependencies are prebuilt by the build-deps.yml workflow and
  # published as a GitHub Release asset.  This avoids rebuilding
  # OpenCV from source on every release (saves ~20-30 min).
  # ----------------------------------------------------------------------
  windows:
    name: Windows (.zip)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DEPS_TAG: deps-windows-v1
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg (toolchain file only, no package install)
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Download prebuilt dependencies
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:DEPS_TAG
          $asset = "vcpkg-deps-x64-windows.zip"
          $url = "https://github.com/${{ github.repository }}/releases/download/${tag}/${asset}"
          Write-Host "Downloading prebuilt deps from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $asset -Headers @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/octet-stream"
          }
          Write-Host "Extracting to C:\vcpkg_installed ..."
          Expand-Archive -Path $asset -DestinationPath C:\vcpkg_installed -Force
          Remove-Item $asset
          Write-Host "Done. Contents:"
          Get-ChildItem C:\vcpkg_installed -Depth 1

      - name: Configure
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DVCPKG_INSTALLED_DIR=C:\vcpkg_installed `
            -DVCPKG_MANIFEST_MODE=OFF `
            -DIDIFF_USE_OPENCV_IMGCODECS=ON `
            -DIDIFF_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Package (copy runtime DLLs next to idiff.exe)
        run: cmake --build build --config Release --target idiff_package

      - name: Stage distributable folder
        shell: pwsh
        run: |
          $stage = "dist\idiff-${{ github.ref_name }}-windows"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item build\src\app\Release\*.exe $stage
          Copy-Item build\src\app\Release\*.dll $stage -ErrorAction SilentlyContinue
          # Compress-Archive zips the folder (top-level dir preserved).
          Compress-Archive -Path $stage -DestinationPath "$stage.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: idiff-windows
          path: dist/*.zip
          if-no-files-found: error

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          fail_on_unmatched_files: true
